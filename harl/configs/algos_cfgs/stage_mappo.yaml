# Configuration for Stage-Aware MAPPO (ordered obs->act attack with stage values).
#
# Stage-Aware MAPPO keeps a SINGLE shared centralized critic but gives it a
# genuine two-stage value structure with intra-step Bellman bootstrapping
# (unlike vanilla EP MAPPO or the input-masked causal MA-MAPPO). Each env step
# is split into two decision stages driven by the same critic V:
#     o-stage (obs attacker): x^o = [s, 0]
#     a-stage (act attacker): x^a = [s, victim.act(s + delta_o)]
#     V^o(x^o_t) = E_{u^o}[ V^a(x^a_t) ]                  (within-step, no reward/discount)
#     V^a(x^a_t) = E_{u^a}[ r_t + gamma V^o(x^o_{t+1}) ]  (across-step, reward r, discount gamma)
# A stage-aware GAE over the doubled stage sequence gives the exact advantage
# decomposition A = A_obs + A_act.
#
# MUST be launched with the robust_attack env set to:
#     --state_type FP --causal_critic_state True
# (FP -> one critic produces a per-agent value; causal -> the env masks the
#  leader's victim-action slot so x^o = [s, 0]). The two attackers are
# heterogeneous, so actor parameter sharing is OFF.
seed:
  # whether to use the specified seed
  seed_specify: True
  # seed
  seed: 10
device:
  # whether to use CUDA
  cuda: True
  # whether to set CUDA deterministic
  cuda_deterministic: True
  # arg to torch.set_num_threads
  torch_threads: 4
train:
  # number of parallel environments for training data collection
  n_rollout_threads: 1
  # number of total training steps
  num_env_steps: 4050000
  # number of steps per environment per training data collection
  episode_length: 315
  # logging interval
  log_interval: 2
  # evaluation interval
  eval_interval: 25
  # whether to use ValueNorm
  use_valuenorm: True
  # whether to use linear learning rate decay
  use_linear_lr_decay: False
  # whether to consider the case of truncation when an episode is done
  use_proper_time_limits: True
  # if set, load models from this directory; otherwise, randomly initialise the models
  model_dir: ~

eval:
  # whether to use evaluation
  use_eval: False
  # number of parallel environments for evaluation
  n_eval_rollout_threads: 5
  # number of episodes per evaluation
  eval_episodes: 5
render:
  # whether to use render
  use_render: False
  # number of episodes to render
  render_episodes: 10
model:
  # network parameters
  # hidden sizes for mlp module in the network
  hidden_sizes: [128, 128]
  # activation function, choose from sigmoid, tanh, relu, leaky_relu, selu
  activation_func: relu
  # whether to use feature normalization
  use_feature_normalization: True
  # initialization method for network parameters, choose from xavier_uniform_, orthogonal_, ...
  initialization_method: orthogonal_
  # gain of the output layer of the network.
  gain: 0.01
  # recurrent parameters
  # whether to use rnn policy (data is not chunked for training)
  use_naive_recurrent_policy: False
  # whether to use rnn policy (data is chunked for training)
  use_recurrent_policy: False
  # number of recurrent layers
  recurrent_n: 1
  # length of data chunk; only useful when use_recurrent_policy is True; episode_length has to be a multiple of data_chunk_length
  data_chunk_length: 25
  # optimizer parameters
  # actor learning rate
  lr: 0.0005
  # critic learning rate
  critic_lr: 0.0005
  # eps in Adam
  opti_eps: 0.00001
  # weight_decay in Adam
  weight_decay: 0
  # parameters of diagonal Gaussian distribution
  std_x_coef: 1
  # parameters of diagonal Gaussian distribution
  std_y_coef: 0.5
algo:
  # ppo parameters
  # number of epochs for actor update
  ppo_epoch: 5
  # number of epochs for critic update
  critic_epoch: 5
  # whether to use clipped value loss
  use_clipped_value_loss: True
  # clip parameter
  clip_param: 0.2
  # number of mini-batches per epoch for actor update
  actor_num_mini_batch: 1
  # number of mini-batches per epoch for critic update
  critic_num_mini_batch: 1
  # coefficient for entropy term in actor loss
  entropy_coef: 0.01
  # coefficient for value loss
  value_loss_coef: 1
  # whether to clip gradient norm
  use_max_grad_norm: True
  # max gradient norm
  max_grad_norm: 10.0
  # whether to use Generalized Advantage Estimation (GAE)
  use_gae: True
  # discount factor
  gamma: 0.99
  # GAE lambda (temporal credit across env steps, a_t -> o_{t+1})
  gae_lambda: 0.95
  # Stage-coupling lambda for the obs (leader) advantage:
  #   adv_o = delta_o + stage_lambda * adv_a
  # null -> falls back to gae_lambda (original single-lambda behavior).
  # 0.0  -> obs actor trains on the pure stage gap delta_o = V^a - V^o
  #         (drops the follower-coupling term; lowest variance, most myopic).
  stage_lambda: 0.7
  # Drop the intra-step critic-difference term delta_o = V^a - V^o from the obs
  # (leader) ACTOR advantage only (critic returns untouched): adv_o -> stage_lambda
  # * adv_a. Keep stage_lambda high (>=~0.95) when enabling, else the obs actor
  # loses its reward signal and stops learning.
  stage_drop_delta_o: False
  # whether to use huber loss
  use_huber_loss: True
  # whether to use policy active masks
  use_policy_active_masks: True
  # huber delta
  huber_delta: 10.0
  # method of aggregating the probability of multi-dimensional actions, choose from prod, mean
  action_aggregation: prod
  # whether to share parameter among actors (OFF: the two attackers are heterogeneous)
  share_param: False
  # whether to use a fixed optimisation order
  fixed_order: True
logger:
  # logging directory
  log_dir: "./results"
  # whether to log to Weights & Biases (standard on/off switch for victim & attacker)
  use_wandb: False
  # wandb run settings (only used when use_wandb is True)
  wandb_project: "robust-gymnasium"
  wandb_entity: ~
  wandb_group: ~
  wandb_name: ~
